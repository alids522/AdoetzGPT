name: Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-android:
    name: Build AdoetzGPT Android
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install npm dependencies
        run: npm install

      - name: Type check
        run: npm run lint

      - name: Build web app and sync Android
        run: npm run android:sync

      - name: Build debug APK and AAB
        working-directory: android
        run: |
          set -o pipefail
          chmod +x ./gradlew
          ./gradlew assembleDebug bundleDebug --stacktrace | tee ../android-build.log

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AdoetzGPT-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload debug AAB
        uses: actions/upload-artifact@v4
        with:
          name: AdoetzGPT-debug-aab
          path: android/app/build/outputs/bundle/debug/*.aab
          if-no-files-found: error
